# ALPINE Configuration
# BALM model with LoRA fine-tuning on ESM-2 (PEFT)

experiment_name: "ALPINE_LoRA_ESM2"
description: "ALPINE: BALM Model with LoRA fine-tuning on ESM-2"

# Data Configuration
data:
  dataset_path: "data/PPB_Affinity_Sequences_Final (version 1).csv"
  cache_dir: "cache"
  embedding_cache: null  # Not needed for LoRA (processes sequences directly)

# Model Configuration
model:
  model_name: "facebook/esm2_t33_650M_UR50D"
  embedding_size: 1280
  projected_size: 256
  projected_dropout: 0.1
  freeze_backbone: false
  use_lora: true
  
  # LoRA Configuration
  lora:
    rank: 8
    alpha: 16
    dropout: 0.1
    target_modules: ["key", "query", "value"]
    bias: "none"
    task_type: "FEATURE_EXTRACTION"

# Data Splitting Configuration - Three variants
data_split:
  cv_strategy: "random"  # Can be: random, cold_target, sequence_similarity
  n_folds: 5
  seed: 42

# Training Configuration
training:
  epochs: 30
  batch_size: 1  # Keep as 1 for sequence models unless you have padding issues
  learning_rate: 1.0e-4
  weight_decay: 0.01   # torch.optim.AdamW default (matches notebooks)
  patience: 15
  optimizer: "adamw"
  warmup_steps: 0

# Device Configuration
device:
  type: "auto"
  mixed_precision: false
  num_workers: 0  # Set to 0 for sequence processing

# Output Configuration
output:
  results_dir: "results/alpine"
  save_best_model: true
  save_predictions: true
  plot_results: true

# Reproducibility
reproducibility:
  seed: 42
  deterministic: true

# Split-specific configurations
splits:
  random:
    name: "ALPINE_Random"
    cv_strategy: "random"
  
  cold_target:
    name: "ALPINE_Cold"
    cv_strategy: "cold_target"
  
  sequence_similarity:
    name: "ALPINE_SeqSim"
    cv_strategy: "sequence_similarity"
